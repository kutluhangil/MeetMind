# Worker internal API
upstream worker {
    server worker:3002;
    keepalive 4;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Worker health check (internal only)
    location /worker/health {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://worker/health;
    }

    # Worker enqueue endpoint (secured by WORKER_API_SECRET)
    location /worker/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://worker/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Upload rate limit
    location /api/upload {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://web_upstream;
        client_max_body_size 520M;
        proxy_request_buffering off;
    }

    # Vercel handles the web frontend — Cloudflare Tunnel proxies directly
    # If self-hosting Next.js:
    # location / {
    #     proxy_pass http://nextjs:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }
}
